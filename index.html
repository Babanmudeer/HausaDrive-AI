<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HausaDrive AI</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#00ff88;
}

#chat{
background:#222;
height:350px;
overflow-y:auto;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input{
width:72%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
padding:12px;
background:#00ff88;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-left:5px;
}

.ai{
color:#00ff88;
margin:10px 0;
}

.user{
color:#66aaff;
margin:10px 0;
}
</style>

</head>

<body>

<h1>🚛 HausaDrive AI</h1>

<div id="chat">
<div class="ai">
<b>HausaDrive AI:</b><br>
Sannu! Barka da zuwa HausaDrive AI.
</div>
</div>

<input
id="msg"
type="text"
placeholder="Rubuta sakonka..."
>

<button onclick="sendMessage()">
Send
</button>

<script>

function sendMessage(){

let input=document.getElementById("msg");

let chat=document.getElementById("chat");

let text=input.value;

if(text=="") return;

chat.innerHTML+=
"<div class='user'><b>Kai:</b><br>"+text+"</div>";

let reply="Ban fahimta ba.";

let t=text.toLowerCase();

if(t.includes("sannu"))
reply="Wa alaikum salam.";

else if(t.includes("sunanka"))
reply="Ni ne HausaDrive AI.";

else if(t.includes("truck"))
reply="Ina taimakawa direbobin manyan motoci.";

else if(t.includes("direba"))
reply="Allah ya kiyaye hanya.";

else if(t.includes("na gode"))
reply="Babu komai.";

chat.innerHTML+=
"<div class='ai'><b>HausaDrive AI:</b><br>"+reply+"</div>";

input.value="";

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
